<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="bantLo - Expense Sharing App" />
    <title>bantLo</title>
    <!-- Basic PWA Manifest link (You can create manifest.json later) -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('SW Reg Success:', reg.scope))
            .catch(err => console.error('SW Reg Failure:', err));
        });
      }
    </script>
  </body>
</html>
